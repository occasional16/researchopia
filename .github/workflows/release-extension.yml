name: Release Browser Extension

on:
  push:
    tags:
      - 'extension/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      working-directory: extension
      run: npm ci

    - name: Build extension
      working-directory: extension
      run: npm run build

    - name: Package extension
      run: |
        cd extension/dist
        zip -r ../../researchopia-extension.zip .

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/extension/v}" >> $GITHUB_OUTPUT

    - name: Create extension release
      uses: softprops/action-gh-release@v2
      with:
        make_latest: false
        name: Browser Extension v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        body: |
          ![GitHub Downloads](https://img.shields.io/github/downloads/occasional16/researchopia/extension/v${{ steps.version.outputs.VERSION }}/total)

          ### 🎉 研学港 | Researchopia

          **研学并进，智慧共享 | Where Research Meets Community**

          - **主网站**地址：[https://www.researchopia.com/](https://www.researchopia.com/)
          - 点击查看 **Zotero插件** 和 **浏览器扩展** 的 **[下载方式](https://www.researchopia.com/updates)**

          ---
        files: |
          researchopia-extension.zip
