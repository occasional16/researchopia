name: Release Website

on:
  push:
    tags:
      - 'website/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/website/v}" >> $GITHUB_OUTPUT

    - name: Create website release
      uses: softprops/action-gh-release@v2
      with:
        make_latest: false
        name: Website v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        body: |
          ### 🎉 研学港 | Researchopia

          **研学并进，智慧共享 | Where Research Meets Community**

          - **主网站**地址：[https://www.researchopia.com/](https://www.researchopia.com/)
          - 点击查看 **Zotero插件** 和 **浏览器扩展** 的 **[下载方式](https://www.researchopia.com/updates)**

          ---
