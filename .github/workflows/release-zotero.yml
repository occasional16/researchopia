name: Release Zotero Plugin

on:
  push:
    tags:
      - 'zotero-plugin/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install plugin dependencies
      working-directory: zotero-plugin
      run: npm ci

    - name: Build plugin
      working-directory: zotero-plugin
      env:
        NODE_ENV: production
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      run: npm run build

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/zotero-plugin/v}" >> $GITHUB_OUTPUT

    - name: Create plugin release
      uses: softprops/action-gh-release@v2
      with:
        make_latest: true
        name: Zotero Plugin v${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        body: |
          ![GitHub Downloads](https://img.shields.io/github/downloads/occasional16/researchopia/zotero-plugin/v${{ steps.version.outputs.VERSION }}/total)

          ### 🎉 研学港 | Researchopia

          **研学并进，智慧共享 | Where Research Meets Community**

          - **主网站**地址：[https://www.researchopia.com/](https://www.researchopia.com/)
          - 点击查看 **Zotero插件** 和 **浏览器扩展** 的 **[下载方式](https://www.researchopia.com/updates)**

          ---
        files: |
          zotero-plugin/build/researchopia-zotero-latest.xpi

    - name: Update release tag with update.json
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Delete existing 'release' tag and recreate to point to current commit
        gh release delete release --yes || true
        git push origin :refs/tags/release || true
        git tag -f release
        git push origin release

        # Create/update the 'release' release with update.json files
        VERSION="${GITHUB_REF#refs/tags/zotero-plugin/v}"
        TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        NOTES="⚠️ This release is used to host update.json, please do not delete or modify it!"
        NOTES="${NOTES}\nUpdated at UTC ${TIMESTAMP} for version ${VERSION}"
        gh release create release \
          --title "Latest Update Manifest" \
          --notes "$(echo -e "${NOTES}")" \
          --latest=false \
          zotero-plugin/build/update.json \
          zotero-plugin/build/update-beta.json
