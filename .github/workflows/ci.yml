name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build website
      run: npm run build

    - name: Run tests
      run: npm run test:ci

  zotero-plugin:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install plugin dependencies
      working-directory: zotero-plugin
      run: npm ci

    - name: Build plugin
      working-directory: zotero-plugin
      run: npm run build

    - name: Run plugin tests
      working-directory: zotero-plugin
      run: npm test
